<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <svg id="swarm-svg" width="800" height="800"></svg>
    <script>
        fetch('/api/topology').then(r => r.json()).then(data => {
            const root = d3.hierarchy(data)
            .sum(d => d.value ? Math.max(d.value, 1024) : 0)
            .sort((a, b) => b.value - a.value);
            
            console.log("Root value:", root.value);
            
            const partition = d3.partition().size([2 * Math.PI, 400]);
            partition(root);
            
            console.log("Nodes:", root.descendants().length);
            console.log("First child x0:", root.children[0].x0, "y0:", root.children[0].y0);
            
            const arc = d3.arc()
                .startAngle(d => d.x0)
                .endAngle(d => d.x1)
                .innerRadius(d => Math.max(0, d.y0))
                .outerRadius(d => Math.max(0, d.y1));
            
            d3.select('#swarm-svg')
              .append('g').attr('transform', 'translate(400,400)')
              .selectAll('path')
              .data(root.descendants())
              .enter()
              .append('path')
              .attr('d', arc)
              .style("fill", "magenta")
              .style("stroke", "white");
        }).catch(err => console.error(err));
    </script>
</body>
</html>
