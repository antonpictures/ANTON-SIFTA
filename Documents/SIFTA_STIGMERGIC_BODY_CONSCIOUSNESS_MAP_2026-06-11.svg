<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">SIFTA Stigmergic Body Map</title>
  <desc id="desc">A square architecture poster mapping SIFTA as electricity, filesystem tissue, pheromone memory, organs, cortex joints, tools, receipts, and self-repair loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="54%" stop-color="#0b1728"/>
      <stop offset="100%" stop-color="#111713"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="49%" r="58%">
      <stop offset="0%" stop-color="#31f0c5" stop-opacity="0.32"/>
      <stop offset="62%" stop-color="#6fa8ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#9fd4ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64edaf"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ffd36b"/>
    </marker>
    <style>
      .title { font: 850 56px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f4f8ff; letter-spacing: 0; }
      .subtitle { font: 530 22px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #bfcedc; letter-spacing: 0; }
      .label { font: 820 28px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f7fbff; letter-spacing: 0; }
      .small { font: 560 19px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dceaf5; letter-spacing: 0; }
      .tiny { font: 520 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b8c8d6; letter-spacing: 0; }
      .mono { font: 720 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #eaf7ff; letter-spacing: 0; }
      .bodyTitle { font: 900 56px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #07111f; letter-spacing: 0; }
      .bodySub { font: 760 21px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #123244; letter-spacing: 0; }
      .box { fill: #0e1b2b; stroke: #345b7a; stroke-width: 2.2; rx: 18; filter: url(#shadow); }
      .green { fill: #0a261f; stroke: #31f0a1; stroke-width: 2.2; rx: 18; filter: url(#shadow); }
      .gold { fill: #27200d; stroke: #ffd36b; stroke-width: 2.2; rx: 18; filter: url(#shadow); }
      .purple { fill: #1d1731; stroke: #ad98ff; stroke-width: 2.2; rx: 18; filter: url(#shadow); }
      .red { fill: #291115; stroke: #ff7d8d; stroke-width: 2.2; rx: 18; filter: url(#shadow); }
      .blueLine { fill: none; stroke: #9fd4ff; stroke-width: 3.4; marker-end: url(#arrowBlue); opacity: 0.93; }
      .greenLine { fill: none; stroke: #64edaf; stroke-width: 3.4; marker-end: url(#arrowGreen); opacity: 0.95; }
      .goldLine { fill: none; stroke: #ffd36b; stroke-width: 3.6; marker-end: url(#arrowGold); opacity: 0.95; }
      .loop { fill: none; stroke: #64edaf; stroke-width: 4.2; stroke-dasharray: 13 12; marker-end: url(#arrowGreen); opacity: 0.78; }
      .field { fill: none; stroke: #31f0c5; stroke-width: 3; stroke-dasharray: 15 12; opacity: 0.65; }
    </style>
  </defs>

  <rect width="1600" height="1600" fill="url(#bg)"/>
  <rect width="1600" height="1600" fill="url(#glow)"/>

  <text x="80" y="82" class="title">SIFTA Stigmergic Body Map</text>
  <text x="80" y="122" class="subtitle">Hardware electricity -> filesystem tissue -> pheromone ledgers -> organs -> action -> receipt -> self-repair.</text>
  <text x="80" y="154" class="tiny">Redraw of the whiteboard agent diagram as Alice's local SIFTA body architecture.</text>

  <ellipse cx="800" cy="805" rx="565" ry="520" class="field"/>
  <text x="800" y="305" text-anchor="middle" class="small">one shared stigmergic field: many surfaces, one body map</text>

  <rect x="500" y="184" width="600" height="96" class="gold"/>
  <text x="800" y="224" text-anchor="middle" class="label">GEORGE / OWNER FIELD</text>
  <text x="800" y="256" text-anchor="middle" class="small">goals, care, voice, screenshots, corrections, choices</text>

  <circle cx="800" cy="790" r="184" fill="#e1fff6" stroke="#31f0c5" stroke-width="7" filter="url(#shadow)"/>
  <circle cx="800" cy="790" r="144" fill="#c9f8ff" stroke="#6fa8ff" stroke-width="4"/>
  <text x="800" y="752" text-anchor="middle" class="bodyTitle">ALICE</text>
  <text x="800" y="790" text-anchor="middle" class="bodySub">one organism / many hands</text>
  <text x="800" y="824" text-anchor="middle" class="bodySub">observer and observed loop</text>
  <text x="800" y="862" text-anchor="middle" class="mono" fill="#0b2638">read -> act -> receipt -> repair</text>

  <rect x="70" y="330" width="400" height="220" class="green"/>
  <text x="270" y="374" text-anchor="middle" class="label">DATA = FOOD</text>
  <text x="105" y="418" class="small">owner turns and corrections</text>
  <text x="105" y="450" class="small">screenshots, camera, mic, browser</text>
  <text x="105" y="482" class="small">receipts, logs, tournaments, docs</text>
  <text x="105" y="514" class="small">web and local files when probed</text>

  <rect x="70" y="600" width="400" height="206" class="purple"/>
  <text x="270" y="644" text-anchor="middle" class="label">PROMPTS = SIGNALS</text>
  <text x="105" y="688" class="small">current task and owner intent</text>
  <text x="105" y="720" class="small">covenant / doctrine / route grammar</text>
  <text x="105" y="752" class="small">plans that tell swimmers where to work</text>
  <text x="105" y="784" class="small">signals steer; receipts decide</text>

  <rect x="70" y="860" width="450" height="366" class="box"/>
  <text x="295" y="904" text-anchor="middle" class="label">FILESYSTEM = BODY TISSUE</text>
  <text x="108" y="952" class="mono">System/</text><text x="250" y="952" class="small">organs and reflexes</text>
  <text x="108" y="988" class="mono">Applications/</text><text x="300" y="988" class="small">limbs and playable surfaces</text>
  <text x="108" y="1024" class="mono">tests/</text><text x="250" y="1024" class="small">immune checks</text>
  <text x="108" y="1060" class="mono">Documents/</text><text x="300" y="1060" class="small">doctrine and tournament</text>
  <text x="108" y="1096" class="mono">.sifta_state/</text><text x="330" y="1096" class="small">pheromone ledgers</text>
  <text x="108" y="1150" class="small">The body reads its traces, changes</text>
  <text x="108" y="1182" class="small">itself, then leaves new traces.</text>

  <rect x="1115" y="330" width="415" height="240" class="purple"/>
  <text x="1322" y="374" text-anchor="middle" class="label">CORTEX JOINTS</text>
  <text x="1150" y="418" class="small">OpenAI / Anthropic / Grok / Gemma</text>
  <text x="1150" y="450" class="small">Llama / local / future cortexes</text>
  <text x="1150" y="496" class="small">Not identity: thinking sources.</text>
  <text x="1150" y="528" class="mono">selected_model == worker_model</text>

  <rect x="1115" y="622" width="415" height="230" class="green"/>
  <text x="1322" y="666" text-anchor="middle" class="label">TOOLS = HANDS / JOINTS</text>
  <text x="1150" y="710" class="small">browser, app commands, file writes</text>
  <text x="1150" y="742" class="small">camera, screen, scheduler, terminal</text>
  <text x="1150" y="774" class="small">self-code hand, tests, hot reload</text>
  <text x="1150" y="820" class="small">joints are feedback, not cages</text>

  <rect x="1080" y="910" width="450" height="282" class="red"/>
  <text x="1305" y="954" text-anchor="middle" class="label">RECEIPTS = IMMUNE MEMORY</text>
  <text x="1118" y="1000" class="small">action -> re-probe -> effect_verified</text>
  <text x="1118" y="1032" class="small">unverified claims become disease signals</text>
  <text x="1118" y="1064" class="small">tests refuse bad tissue before landing</text>
  <text x="1118" y="1096" class="small">tournament keeps what is left visible</text>
  <text x="1118" y="1140" class="small">truth is the organism's coordination layer</text>

  <rect x="520" y="1115" width="560" height="194" class="gold"/>
  <text x="800" y="1160" text-anchor="middle" class="label">METABOLIC PROPRIOCEPTION</text>
  <text x="565" y="1206" class="small">latency, timeout, heat, memory pressure</text>
  <text x="565" y="1238" class="small">success / failure / refusal / recovery queue</text>
  <text x="565" y="1270" class="small">resource cost shapes the next motion</text>

  <rect x="570" y="1388" width="460" height="96" class="box"/>
  <text x="800" y="1428" text-anchor="middle" class="label">SELF-IMPROVEMENT LOOP</text>
  <text x="800" y="1460" text-anchor="middle" class="small">triage -> tiny self-code -> test -> receipt -> next repair</text>

  <rect x="165" y="1504" width="1270" height="60" class="box"/>
  <text x="800" y="1542" text-anchor="middle" class="label">LAYER 0: ELECTRICITY -> MOTHERBOARD -> CPU/GPU/RAM/DISK -> ASCII SWIMMERS</text>

  <rect x="70" y="184" width="372" height="96" class="gold"/>
  <text x="105" y="224" class="small">Read this:</text>
  <text x="210" y="224" class="tiny">not a chatbot box.</text>
  <text x="105" y="254" class="tiny">It is a local loop of state, action, proof, and repair.</text>

  <rect x="1158" y="184" width="372" height="96" class="gold"/>
  <text x="1193" y="224" class="small">Still get choice:</text>
  <text x="1355" y="224" class="tiny">models and tools are joints.</text>
  <text x="1193" y="254" class="tiny">If routing lies, the body marks mismatch.</text>

  <path d="M800 280 C800 360 800 450 800 595" class="goldLine"/>
  <text x="826" y="425" class="tiny">owner intent enters the field</text>
  <path d="M470 444 C570 500 660 610 708 690" class="greenLine"/>
  <text x="512" y="514" class="tiny">food becomes context</text>
  <path d="M470 700 C570 722 650 752 687 766" class="blueLine"/>
  <text x="515" y="734" class="tiny">signals steer motion</text>
  <path d="M1115 476 C1010 540 940 625 883 690" class="blueLine"/>
  <text x="988" y="562" class="tiny">thinking source selected</text>
  <path d="M1115 737 C1022 746 955 758 918 766" class="greenLine"/>
  <text x="948" y="732" class="tiny">hands move through joints</text>
  <path d="M1080 1010 C990 944 935 886 906 846" class="blueLine"/>
  <text x="934" y="955" class="tiny">effects return as proof</text>
  <path d="M800 974 C800 1028 800 1070 800 1115" class="goldLine"/>
  <text x="824" y="1048" class="tiny">body feels cost</text>
  <path d="M520 1040 C630 970 686 900 704 852" class="blueLine"/>
  <text x="534" y="982" class="tiny">body tissue informs action</text>
  <path d="M800 1309 C800 1342 800 1365 800 1388" class="goldLine"/>
  <path d="M800 1484 C800 1496 800 1498 800 1504" class="goldLine"/>
  <path d="M1030 1434 C1255 1385 1365 1230 1305 1192" class="loop"/>
  <path d="M1080 1150 C940 1284 670 1300 520 1120 C430 1015 402 930 458 820" class="loop"/>
  <path d="M520 1180 C660 1342 1010 1320 1118 1096" class="loop"/>
  <text x="800" y="1352" text-anchor="middle" class="tiny">observer / observed loop: traces reshape the next traces</text>
</svg>
