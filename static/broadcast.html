<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIGMERGICODE // GLOBAL BROADCAST</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --bg-panel: #16191f;
            --text-color: #a0abbc;
            --text-muted: #5e6b7e;
            --cyan: #00f0ff;
            --cyan-dim: rgba(0, 240, 255, 0.15);
            --border-dim: #2a303a;
            --alert-red: #ff3366;
            --health-nominal: #00ffaa;
            --font-mono: 'SF Mono', 'Roboto Mono', Menlo, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: rgba(13, 15, 18, 0.95);
            border-bottom: 1px solid var(--cyan-dim);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-family: var(--font-mono);
            color: var(--cyan);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .live-tag {
            background: var(--alert-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.1em;
            animation: pulse-red 2s infinite;
        }

        main {
            flex: 1;
            display: flex;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .side-panel {
            flex: 1;
        }

        .center-panel {
            flex: 2;
            border-color: var(--cyan-dim);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.05);
        }

        .panel-header {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-dim);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--cyan);
            letter-spacing: 0.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            position: relative;
        }

        /* Giant TV Terminal */
        .hologram-terminal {
            flex: 1;
            background: #000;
            color: #00ffaa;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            padding: 2rem;
            overflow-y: auto;
            line-height: 1.6;
            white-space: pre-wrap;
            box-shadow: inset 0 0 50px rgba(0,255,170,0.1);
        }

        .t-dim { color: #5e6b7e; }
        .t-error { color: var(--alert-red); font-weight: bold; }
        .t-highlight { color: #fff; background: rgba(0,255,170,0.2); padding:0 4px; border-radius:2px; }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th { color: var(--text-muted); font-weight: 600; position: sticky; top: 0; background: var(--bg-panel); z-index: 10; font-size:0.75rem;}
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .agent-id { color: var(--cyan); }
        .event-nominal { color: var(--health-nominal); }
        .event-warning { color: #ffbf00; }
        .event-critical { color: var(--alert-red); }
        .file-path { color: #a0abbc; opacity: 0.8; }
        .timestamp { color: var(--text-muted); font-size: 0.8em; }

        .agent-card {
            padding: 1rem;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .agent-name { font-weight: bold; color: var(--cyan); }
        .agent-style { background: rgba(0, 255, 170, 0.1); color: var(--health-nominal); border: 1px solid rgba(0, 255, 170, 0.2); padding: 0.2rem 0.5rem; font-size: 0.7rem; border-radius: 4px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; box-shadow: 0 0 10px var(--alert-red); } 100% { opacity: 1; } }
        @keyframes boot-flash { 0% { opacity: 0; } 10% { opacity: 1; } 15% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 1; } }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .idle-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--text-muted);
            font-family: var(--font-mono);
            background: rgba(0,0,0,0.8);
            z-index: 5;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <header class="boot-seq">
        <div class="brand-title">
            ⬡ STIGMERGICODE // GLOBAL OBSERVER
            <span class="live-tag">LIVE</span>
        </div>
        <div style="font-family: var(--font-mono); color: var(--text-muted); font-size: 0.8rem;">
            SWARM ACTIVITY STREAM (READ-ONLY)
        </div>
    </header>

    <main class="boot-seq">
        <section class="panel side-panel">
            <div class="panel-header">
                <span>◉ REPAIR LEDGER</span>
                <span id="log-count" style="color:var(--text-muted)">0 EVENTS</span>
            </div>
            <div class="panel-body">
                <table id="logs-table">
                    <thead><tr><th width="20%">TIME</th><th width="30%">EVENT</th><th width="50%">FILE</th></tr></thead>
                    <tbody id="logs-body">
                        <tr><td colspan="3" style="text-align:center; padding: 2rem; color:var(--text-muted);">Syncing...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="panel center-panel">
            <div class="panel-header" style="border-bottom-color: var(--cyan-dim);">
                <span>&gt;_ LIVE NEURAL FEED</span>
                <span style="color:var(--health-nominal)" id="tv-status">STANDBY</span>
            </div>
            <div class="panel-body" style="background:#000; display:flex; flex-direction:column;">
                <div id="idle-overlay" class="idle-overlay">
                    <span style="font-size:2rem; margin-bottom:1rem;">⬡</span>
                    <span style="letter-spacing:0.2em;">SWARM IS CURRENTLY IDLE</span>
                    <span style="font-size:0.7rem; margin-top:0.5rem;">WAITING FOR OPERATOR INSTRUCTION... <span class="blink">▋</span></span>
                </div>
                <div id="hologram-terminal" class="hologram-terminal"></div>
            </div>
        </section>

        <section class="panel side-panel">
            <div class="panel-header">
                <span>⬡ ACTIVE ROSTER</span>
                <span id="fleet-count" style="color:var(--cyan)">0 NODES</span>
            </div>
            <div class="panel-body" id="fleet-body"></div>
        </section>
    </main>

    <script>
        // Terminal Polling logic
        let lastBufferLength = 0;

        function formatLogLine(line) {
            let html = line.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            if (html.includes('[FAULT]') || html.includes('ERROR') || html.includes('[ABORT]')) {
                html = html.replace(/(\[.*?\])/, '<span class="t-error">$1</span>');
            } else if (html.includes('[BITE]') || html.includes('[LLM]') || html.includes('[RADIO]')) {
                html = html.replace(/(\[.*?\])/, '<span class="t-highlight">$1</span>');
            } else {
                html = html.replace(/(\[.*?\])/, '<span style="color:var(--text-muted)">$1</span>');
            }
            return html;
        }

        async function fetchTerminal() {
            try {
                const res = await fetch('/api/terminal');
                const data = await res.json();
                
                const term = document.getElementById('hologram-terminal');
                const overlay = document.getElementById('idle-overlay');
                const status = document.getElementById('tv-status');
                
                if (data.active) {
                    overlay.style.opacity = "0";
                    overlay.style.pointerEvents = "none";
                    status.innerText = "STREAMING...";
                    status.style.color = "var(--alert-red)";
                    status.classList.add('blink');
                } else {
                    overlay.style.opacity = "1";
                    status.innerText = "STANDBY";
                    status.style.color = "var(--health-nominal)";
                    status.classList.remove('blink');
                }

                if (data.buffer && data.buffer.length > 0) {
                    // Only re-render if buffer actually changed to prevent scroll jumping
                    if (data.buffer.length !== lastBufferLength || data.buffer[data.buffer.length-1] !== term.dataset.lastLine) {
                        const html = data.buffer.map(line => `<div>${formatLogLine(line)}</div>`).join('');
                        term.innerHTML = html + `<span class="blink">▋</span>`;
                        term.scrollTop = term.scrollHeight; // auto scroll
                        lastBufferLength = data.buffer.length;
                        term.dataset.lastLine = data.buffer[data.buffer.length-1];
                    }
                } else {
                    term.innerHTML = "";
                    lastBufferLength = 0;
                }

            } catch (e) {
                console.error("Terminal stream offline", e);
            }
        }

        // Ledger & Fleet logic
        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs?tail=25');
                const logs = await res.json();
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = '';
                document.getElementById('log-count').innerText = `${logs.length} EVENTS`;
                logs.forEach(log => {
                    const time = new Date(log.ts).toLocaleTimeString([], {hour12: false});
                    let eventClass = 'event-nominal';
                    if (['abort', 'reject', 'died'].includes(log.event)) eventClass = 'event-critical';
                    else if (log.event === 'scout') eventClass = 'event-warning';
                    else if (log.event === 'coop_handoff') eventClass = 'agent-id';

                    const file = log.file || log.target || '-';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="timestamp">${time}</td>
                        <td class="${eventClass}">[${log.event.toUpperCase()}]</td>
                        <td class="file-path">${file.length > 30 ? '...' + file.slice(-30) : file}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {}
        }

        async function fetchFleet() {
            try {
                const res = await fetch('/api/agents?show_detectives=false');
                const data = await res.json();
                const fleetBody = document.getElementById('fleet-body');
                fleetBody.innerHTML = '';
                if (data.agents) {
                    document.getElementById('fleet-count').innerText = `${data.agents.length} NODES`;
                    data.agents.forEach(agent => {
                        const el = document.createElement('div');
                        el.className = 'agent-card';
                        el.innerHTML = `
                            <div>
                                <div class="agent-name">${agent.id}</div>
                                <div style="font-size:0.65rem; color:var(--text-muted); margin-top:4px;">NRG: ${agent.energy}%</div>
                            </div>
                            <div class="agent-style">${agent.style}</div>
                        `;
                        fleetBody.appendChild(el);
                    });
                }
            } catch (e) {}
        }

        // Extremely fast polling for the terminal feel (750ms)
        setInterval(fetchTerminal, 750);
        // Regular polling for ledger (2s)
        setInterval(() => { fetchLogs(); fetchFleet(); }, 2000);
        
        fetchTerminal();
        fetchLogs();
        fetchFleet();
    </script>
</body>
</html>
