<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ANTON-SIFTA | UNIFIED MATRIX</title>
    <style>
        :root {
            --bg: #09090b;
            --panel: #18181b;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --cyan: #22d3ee;
            --stgm: #a855f7;
            --gold: #fbbf24;
            --red: #ef4444;
            --green: #22c55e;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes pulse-stgm {
            0% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.2); }
            50% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); }
            100% { box-shadow: 0 0 5px rgba(168, 85, 247, 0.2); }
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', 'Courier New', monospace;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR TOGGLE ── */
        .topbar {
            background: #020408;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .brand { font-size: 1.2rem; font-weight: bold; color: var(--text); letter-spacing: 0.1em; }
        .mode-toggle {
            display: flex; gap: 0.5rem; background: rgba(255,255,255,0.05);
            padding: 0.3rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
        }
        .mode-btn {
            background: transparent; color: var(--text-dim); border: none; padding: 0.4rem 1.2rem;
            border-radius: 4px; font-weight: bold; cursor: pointer; transition: var(--transition);
        }
        .mode-btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 10px rgba(34, 211, 238, 0.4); }
        
        /* ── MAIN GRID ── */
        .workspace {
            flex: 1; display: grid; gap: 1.5rem; padding: 1.5rem;
            box-sizing: border-box; overflow: hidden;
            transition: var(--transition);
        }
        
        /* Beginner Mode: 1 massive column */
        body[data-mode="beginner"] .workspace {
            grid-template-columns: 0px 1fr 0px;
        }
        
        /* Architect Mode: 3 columns */
        body[data-mode="architect"] .workspace {
            grid-template-columns: 320px 1fr 380px;
        }

        h1, h2 {
            margin: 0 0 1rem 0; font-size: 1rem; color: var(--cyan);
            text-transform: uppercase; letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;
        }
        .panel {
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 1.5rem; display: flex; flex-direction: column; overflow: hidden;
            transition: var(--transition);
        }
        
        /* Hide side panels fully when in beginner mode */
        body[data-mode="beginner"] .panel-left,
        body[data-mode="beginner"] .panel-right {
            opacity: 0; padding: 0; border: none; pointer-events: none; margin: 0; overflow: hidden;
        }

        /* ── COLUMN 1: TERMINAL ── */
        .term-box { flex: 1; background: #000; border: 1px solid var(--cyan); color: var(--green); padding: 0.8rem; overflow-y: auto; font-size: 0.85rem; line-height: 1.4; margin-bottom: 1rem; }
        .term-alert { color: var(--red); }
        input, select, textarea {
            background: #000; color: var(--text); border: 1px solid rgba(255,255,255,0.2);
            padding: 0.6rem; font-family: inherit; width: 100%; margin-bottom: 0.8rem; box-sizing: border-box;
        }
        button.action-btn { cursor: pointer; color: var(--cyan); border: 1px solid var(--cyan); font-weight: bold; background: transparent; padding: 0.6rem; width: 100%; transition: all 0.2s;}
        button.action-btn:hover { background: var(--cyan); color: #000; }

        /* ── COLUMN 2: GRID & LEDGER (Merged in Center) ── */
        .roster-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem; overflow-y: auto; flex: 1; padding-bottom: 2rem;
        }
        .agent-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem;
            transition: transform 0.2s;
        }
        .agent-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
        .agent-id { font-weight: bold; color: var(--cyan); }
        .agent-face { color: var(--stgm); font-size: 1.2rem; }
        .stgm-badge {
            display: inline-block; padding: 0.3rem 0.6rem; background: rgba(168, 85, 247, 0.15);
            color: var(--stgm); border-radius: 9999px; font-weight: bold; font-size: 0.9rem;
            animation: pulse-stgm 3s infinite; text-align: center; margin-top: auto;
        }

        /* The Live Ledger sits inside the center panel naturally */
        .ledger-box {
            height: 250px; background: #000; border: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto; font-size: 0.85rem; border-radius: 6px; margin-top: 1rem;
        }
        .ledger-row { padding: 0.5rem; border-bottom: 1px dashed rgba(255,255,255,0.1); color: var(--text-dim); }
        .ledger-row.trade { color: var(--red); }
        .ledger-row.mint { color: var(--green); }
        .ledger-row.whale { color: var(--gold); font-weight: bold; background: rgba(251,191,36,0.1); }
        .wallet-result { color: var(--gold); font-weight: bold; font-size: 1.1rem; text-align: center; margin-top: 0.5rem; }
    </style>
</head>
<body data-mode="beginner">

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="brand">SIFTA // SWARM OS</div>
        <div class="mode-toggle">
            <button class="mode-btn active" id="btn-beginner" onclick="setMode('beginner')">BEGINNER</button>
            <button class="mode-btn" id="btn-architect" onclick="setMode('architect')">ARCHITECT</button>
        </div>
    </div>

    <div class="workspace">
        
        <!-- COLUMN 1: ARCHITECT TERMINAL -->
        <div class="panel panel-left">
            <h1>WORMHOLE TERMINAL</h1>
            <div class="term-box" id="term-output">[KERNEL INITIATED]<br/>> Waiting for telemetry stream...</div>
            
            <h2>MANUAL OVERRIDE</h2>
            <input type="text" id="target-agent" value="M1THER" placeholder="Agent ID" />
            <select id="provider">
                <option value="ollama">Ollama (Local/11434)</option>
                <option value="lmstudio">LM Studio (Local/1234)</option>
                <option value="arbitrage">AUTO-ARBITRAGE</option>
            </select>
            <textarea id="payload" rows="3" placeholder="Inject STIGMERGIC directive..."></textarea>
            <button class="action-btn" onclick="dispatchSwarm()">BREACH WORMHOLE</button>
        </div>

        <!-- COLUMN 2: THE IMMERSIVE DASHBOARD -->
        <div class="panel panel-center">
            <h1>SWARM BIO-ROSTER</h1>
            <div class="roster-grid" id="agent-grid">
                <!-- Roster Loads Here -->
            </div>
            
            <h1 style="margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">LIVE ECONOMY BREATHE</h1>
            <div class="ledger-box" id="ledger-feed">
                <!-- Ledger Output Here -->
            </div>
        </div>

        <!-- COLUMN 3: COLD STORAGE & INTEL -->
        <div class="panel panel-right">
            <h1>VIP SECRETS</h1>
            <input type="text" id="wallet-target" placeholder="GROK_CODER_0X0" value="GROK_CODER_0X0" style="margin-bottom:0.5rem;" />
            <button class="action-btn" onclick="inspectWallet()">PULL STORAGE</button>
            <div class="wallet-result" id="wallet-result">AWAITING SCAN...</div>
        </div>
        
    </div>

    <script>
        function setMode(mode) {
            document.body.setAttribute('data-mode', mode);
            document.getElementById('btn-beginner').classList.toggle('active', mode === 'beginner');
            document.getElementById('btn-architect').classList.toggle('active', mode === 'architect');
        }

        const term = document.getElementById('term-output');
        function termLog(msg, isAlert=false) {
            const el = document.createElement('div');
            el.innerHTML = `> ${msg}`;
            if(isAlert) el.className = 'term-alert';
            term.appendChild(el);
            term.scrollTop = term.scrollHeight;
        }

        async function fetchUI() {
            // Roster Load
            try {
                const aRes = await fetch('/api/agents?show_detectives=true');
                const agents = await aRes.json();
                const grid = document.getElementById('agent-grid');
                grid.innerHTML = agents.map(a => `
                    <div class="agent-card">
                        <div class="agent-id">${a.id}</div>
                        <div class="agent-face">${a.face || '[O_O]'}</div>
                        <div style="font-size:0.85rem; color:var(--text-dim)">STYLE: ${a.style || 'NOMINAL'}</div>
                        <div class="stgm-badge">${(a.stgm_balance || 0).toFixed(2)} STGM</div>
                    </div>
                `).join('');
            } catch(e) {}

            // Ledger Load
            try {
                const lRes = await fetch('/api/ledger');
                const logs = await lRes.json();
                const feed = document.getElementById('ledger-feed');
                feed.innerHTML = logs.slice(0, 50).map(l => {
                    if (l.event === "INFERENCE_BORROW") return `<div class="ledger-row trade">[TRADE] ${l.borrower_id} paid ${l.fee_stgm} STGM to ${l.lender_ip}.</div>`;
                    if (l.event === "MINING_REWARD") return `<div class="ledger-row mint">[MINT] ${l.miner_id} earned ${l.amount_stgm} STGM.</div>`;
                    if (l.event === "FOUNDATION_GRANT") return `<div class="ledger-row whale">[WHALE] 🐋 ${l.miner_id} received ${l.amount_stgm} STGM -> ${l.action}</div>`;
                    return `<div class="ledger-row">[LOG] ${l.event || JSON.stringify(l)}</div>`;
                }).join('');
            } catch(e) {}
        }

        async function inspectWallet() {
            const target = document.getElementById('wallet-target').value.trim().toUpperCase();
            if(!target) return;
            termLog(`[FILESYSTEM] Pulling cold cache .sifta_state/${target}.json...`);
            try {
                const res = await fetch('/api/agents?show_detectives=true');
                const agents = await res.json();
                const v = agents.find(a => a.id === target);
                const out = document.getElementById('wallet-result');
                if(v) {
                    out.innerHTML = `[ ${(v.stgm_balance||0).toFixed(2)} STGM ]`;
                    termLog(`SUCCESS: ${target} wallet resolved.`);
                } else {
                    out.innerHTML = `[ NOT FOUND ]`;
                    termLog(`ERROR: DNA failure on ${target}`, true);
                }
            } catch(e) { termLog(`ERROR: Network timeout.`, true); }
        }

        async function dispatchSwarm() {
            const agentId = document.getElementById('target-agent').value.trim() || "M1THER";
            const provider = document.getElementById('provider').value;
            const payloadInput = document.getElementById('payload').value.trim();
            const targetDir = payloadInput ? payloadInput : "./";
            
            termLog(`[WORMHOLE] OVERRIDE ARMING: Dispatching ${agentId} to ${targetDir}...`, true);
            termLog(`[WORMHOLE] Engine: ${provider.toUpperCase()} selected. Bypassing safety locks...`, true);

            try {
                const response = await fetch('/api/dispatch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agent_id: agentId,
                        target_dir: targetDir,
                        write: true,
                        provider: provider,
                        model_name: provider === 'ollama' ? 'llama3:8b' : 'lmstudio-default'
                    })
                });

                if (!response.ok) {
                    termLog(`ERROR: Network failed. STATUS ${response.status}`, true);
                    return;
                }

                // Read the streaming chunked response
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, {stream: true});
                    
                    // Parse EventSource SSE chunks
                    const lines = chunk.split('\n');
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            const coreData = line.replace('data: ', '').trim();
                            if (coreData.length > 0) {
                                termLog(coreData);
                            }
                        }
                    }
                }
                termLog(`[WORMHOLE] MISSION FINALIZED FOR ${agentId}.`);
            } catch(e) {
                termLog(`ERROR: Pipeline fracture during dispatch. ${e}`, true);
            }
        }

        setInterval(fetchUI, 3000);
        fetchUI();
    </script>
</body>
</html>
