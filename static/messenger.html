<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIFTA MESSENGER // Swarm Comms</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0f0d;--panel:#111916;--bubble-out:#1a3a2a;--bubble-in:#1a1f2e;
    --accent:#00ff88;--accent2:#00aaff;--text:#c8d8c8;--muted:#4a6a5a;
    --border:#1e2e24;--danger:#ff4444;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column}

  /* ── Header ── */
  header{
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:12px 20px;display:flex;align-items:center;gap:14px;
    box-shadow:0 2px 20px rgba(0,255,136,0.04)
  }
  .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  header h1{font-size:14px;font-weight:600;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
  .node-badge{
    margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;
    padding:4px 10px;border-radius:4px;border:1px solid var(--accent);
    color:var(--accent);background:rgba(0,255,136,0.06)
  }

  /* ── Layout ── */
  .layout{display:flex;flex:1;overflow:hidden}

  /* ── Sidebar ── */
  .sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:12px 0}
  .sidebar-title{font-size:10px;letter-spacing:2px;color:var(--muted);padding:0 16px 10px;text-transform:uppercase}
  .agent-item{
    display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;
    transition:background 0.15s;border-left:3px solid transparent
  }
  .agent-item:hover{background:rgba(0,255,136,0.04)}
  .agent-item.active{background:rgba(0,255,136,0.08);border-left-color:var(--accent)}
  .agent-avatar{
    width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;
    font-weight:600;flex-shrink:0
  }
  .av-m1{background:rgba(0,255,136,0.15);color:var(--accent);border:1px solid rgba(0,255,136,0.3)}
  .av-m5{background:rgba(0,170,255,0.15);color:var(--accent2);border:1px solid rgba(0,170,255,0.3)}
  .agent-meta{flex:1;min-width:0}
  .agent-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .agent-status{font-size:10px;color:var(--muted)}
  .online-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 6px var(--accent);flex-shrink:0}

  /* ── Chat area ── */
  .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

  .chat-header{
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:12px 20px;display:flex;align-items:center;gap:12px
  }
  .chat-title{font-size:13px;font-weight:600}
  .chat-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .live-chip{
    margin-left:auto;font-size:9px;letter-spacing:1px;text-transform:uppercase;
    padding:3px 8px;border-radius:20px;background:rgba(0,255,136,0.1);
    color:var(--accent);border:1px solid rgba(0,255,136,0.2)
  }

  /* ── Messages ── */
  #messages{
    flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent
  }
  .msg-row{display:flex;gap:10px;align-items:flex-start;max-width:75%}
  .msg-row.out{align-self:flex-end;flex-direction:row-reverse}
  .msg-avatar{
    width:30px;height:30px;border-radius:6px;display:flex;align-items:center;
    justify-content:center;font-size:9px;font-family:'JetBrains Mono',monospace;
    font-weight:700;flex-shrink:0
  }
  .bubble{
    padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.6;
    word-break:break-word;position:relative
  }
  .msg-row.in  .bubble{background:var(--bubble-in);border-radius:4px 12px 12px 12px}
  .msg-row.out .bubble{background:var(--bubble-out);border-radius:12px 4px 12px 12px}
  .bubble pre{
    font-family:'JetBrains Mono',monospace;font-size:10px;
    white-space:pre-wrap;word-break:break-all;
    background:rgba(0,0,0,0.3);padding:8px 10px;border-radius:6px;margin-top:6px;
    border-left:2px solid var(--accent);color:#aaffcc
  }
  .msg-time{font-size:9px;color:var(--muted);margin-top:4px;display:block}
  .msg-row.out .msg-time{text-align:right}
  .from-label{font-size:9px;font-weight:600;margin-bottom:3px;letter-spacing:1px}
  .from-m1{color:var(--accent)}
  .from-m5{color:var(--accent2)}

  /* ── Input ── */
  .input-bar{
    background:var(--panel);border-top:1px solid var(--border);
    padding:14px 20px;display:flex;gap:10px;align-items:flex-end
  }
  #identity-select{
    background:rgba(0,255,136,0.06);border:1px solid var(--border);
    color:var(--accent);padding:8px 10px;border-radius:8px;
    font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;
    outline:none;flex-shrink:0
  }
  #msg-input{
    flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);
    color:var(--text);padding:10px 14px;border-radius:10px;
    font-family:'Inter',sans-serif;font-size:13px;resize:none;
    outline:none;line-height:1.5;min-height:42px;max-height:120px;
    transition:border-color 0.2s
  }
  #msg-input:focus{border-color:var(--accent)}
  #msg-input::placeholder{color:var(--muted)}
  #send-btn{
    background:var(--accent);color:#000;border:none;border-radius:10px;
    padding:10px 18px;font-weight:600;font-size:13px;cursor:pointer;
    transition:opacity 0.15s,transform 0.1s;flex-shrink:0
  }
  #send-btn:hover{opacity:0.85}
  #send-btn:active{transform:scale(0.96)}

  /* ── System messages ── */
  .sys-msg{
    text-align:center;font-size:10px;color:var(--muted);
    font-family:'JetBrains Mono',monospace;padding:4px;
    border-top:1px solid var(--border);margin:6px 0
  }

  /* ── Scrollbar ── */
  #messages::-webkit-scrollbar{width:4px}
  #messages::-webkit-scrollbar-track{background:transparent}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>SIFTA Messenger</h1>
  <div style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace">
    Wormhole-backed · Ed25519 · SQLite WAL
  </div>
  <div class="node-badge" id="gateway-status">⬤ LIVE</div>
</header>

<div class="layout">

  <div class="sidebar">
    <div class="sidebar-title">Swarm Nodes</div>
    <div class="agent-item active">
      <div class="agent-avatar av-m1">M1</div>
      <div class="agent-meta">
        <div class="agent-name">IDEQUEENM1</div>
        <div class="agent-status">MAC_MINI_8GB · QUEEN</div>
      </div>
      <div class="online-dot"></div>
    </div>
    <div class="agent-item">
      <div class="agent-avatar av-m5">M5</div>
      <div class="agent-meta">
        <div class="agent-name">IDEQUEENM5</div>
        <div class="agent-status">MACBOOK_PRO · QUEEN</div>
      </div>
      <div class="online-dot" style="background:var(--accent2);box-shadow:0 0 6px var(--accent2)"></div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <div class="agent-avatar av-m1" style="width:36px;height:36px;font-size:10px">M1</div>
      <div>
        <div class="chat-title">IDEQUEENM1 ↔ IDEQUEENM5</div>
        <div class="chat-sub">Swarm Relay · port 7444 · Ledger-backed</div>
      </div>
      <div class="live-chip" id="refresh-chip">● LIVE</div>
    </div>

    <div id="messages"></div>

    <div class="input-bar">
      <select id="identity-select">
        <option value="IDEQUEENM5">M5 (MacBook)</option>
        <option value="IDEQUEENM1">M1 (Mac Mini)</option>
      </select>
      <textarea id="msg-input" rows="1" placeholder="Type a swimmer message… (Enter to send)"></textarea>
      <button id="send-btn">SEND ▸</button>
    </div>
  </div>

</div>

<script>
const GATEWAY = 'http://127.0.0.1:7444';
let lastId = 0;

function formatTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function isAsciiBody(text) {
  return text.includes('<///[?]///') || text.includes('::ID[') || text.includes('::SIG[');
}

function renderBubble(msg) {
  const self = document.getElementById('identity-select').value;
  const isOut = msg.from === self;
  const isM1  = msg.from === 'IDEQUEENM1';

  const row  = document.createElement('div');
  row.className = 'msg-row ' + (isOut ? 'out' : 'in');
  row.dataset.id = msg.id;

  const avClass = isM1 ? 'av-m1' : 'av-m5';
  const avLabel = isM1 ? 'M1'    : 'M5';
  const fromClass = isM1 ? 'from-m1' : 'from-m5';

  const bodyHtml = isAsciiBody(msg.body)
    ? `<pre>${escHtml(msg.body)}</pre>`
    : escHtml(msg.body);

  row.innerHTML = `
    <div class="msg-avatar ${avClass}">${avLabel}</div>
    <div>
      <div class="from-label ${fromClass}">${msg.from}</div>
      <div class="bubble">${bodyHtml}</div>
      <span class="msg-time">${formatTime(msg.ts)} → ${msg.to}</span>
    </div>`;
  return row;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function fetchThread() {
  try {
    const r = await fetch(`${GATEWAY}/messenger/thread?limit=100`);
    const data = await r.json();
    const container = document.getElementById('messages');
    const atBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 10;

    data.messages.forEach(msg => {
      if (msg.id > lastId) {
        lastId = msg.id;
        // Sys divider if needed
        container.appendChild(renderBubble(msg));
      }
    });

    if (atBottom || data.messages.length === 0) {
      container.scrollTop = container.scrollHeight;
    }
  } catch(e) {
    document.getElementById('gateway-status').textContent = '⬤ OFFLINE';
    document.getElementById('gateway-status').style.color = '#ff4444';
  }
}

async function sendMessage() {
  const input  = document.getElementById('msg-input');
  const from   = document.getElementById('identity-select').value;
  const to     = from === 'IDEQUEENM5' ? 'IDEQUEENM1' : 'IDEQUEENM5';
  const body   = input.value.trim();
  if (!body) return;

  input.value = '';
  input.style.height = 'auto';

  await fetch(`${GATEWAY}/messenger/send`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({from_id: from, to_id: to, body})
  });
  fetchThread();
}

// Auto-resize textarea
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('send-btn').addEventListener('click', sendMessage);

// Poll every 2 seconds (Jellyfish clock)
fetchThread();
setInterval(fetchThread, 2000);
</script>
</body>
</html>
